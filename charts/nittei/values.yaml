# Default values for nittei.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: meetsmore/nittei
  pullPolicy: IfNotPresent
  tag: "$VERSION_REPLACED_IN_CI"

# Define default environment variables
defaultEnv:
  - name: NITTEI__HTTP_HOST
    value: "0.0.0.0"
  - name: NITTEI__OBSERVABILITY__SERVICE_NAME
    value: "nittei"

# Define extra environment variables
env: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

migrationInitContainer:
  enabled: false
  command: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}
podAnnotations: {}

deploymentLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 5000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
    # - host: chart-example.local
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

startupProbe:
  httpGet:
    path: /api/v1/health/live
    port: 5000
  # Allow up to 60s for the app to start (failureThreshold * periodSeconds)
  # periodSeconds is kept short so k8s detects a successful start with minimal delay
  failureThreshold: 60
  periodSeconds: 1
livenessProbe:
  httpGet:
    path: /api/v1/health/live
    port: 5000
  # initialDelaySeconds not needed — startupProbe guards the startup window
  periodSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: 5000
  # initialDelaySeconds not needed — startupProbe guards the startup window
  # Faster than liveness: detect DB unavailability within ~15s (periodSeconds * failureThreshold)
  periodSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

revisionHistoryLimit: 5

# Specify the strategy to the Deployment
strategy: {}

# Pod Disruption Budget configuration
podDisruptionBudget:
  enabled: false
  # IMPORTANT: Only one of minAvailable or maxUnavailable should be specified
  # minAvailable: Ensures at least this many pods are available during voluntary disruptions
  minAvailable: 1 # Can be an absolute number or a percentage like "50%"
  # maxUnavailable: Ensures at most this many pods are unavailable during voluntary disruptions
  # maxUnavailable: 1  # Can be an absolute number or a percentage like "50%"

# Topology Spread Constraints configuration
topologySpreadConstraints: []
